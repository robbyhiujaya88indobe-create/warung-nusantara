<!DOCTYPE html>
<html>
<head>
    <title>Warung Rasa Nusantara - Menu Pembeli</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            color: #333;
            padding: 20px;
            max-width: 650px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #d35400;
            border-bottom: 3px double #d35400;
            padding-bottom: 10px;
        }
        .menu-container, .cart-container {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        .menu-item, .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px dashed #ddd;
            padding: 15px 0;
        }
        .menu-item:last-child, .cart-item:last-child {
            border-bottom: none;
        }
        .menu-info {
            display: flex;
            align-items: center;
        }
        .menu-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }
        .menu-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        .menu-price {
            font-weight: bold;
            color: #e74c3c;
            margin: 0;
        }
        .btn-add {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add:hover {
            background-color: #27ae60;
        }
        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-qty {
            background-color: #7f8c8d;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .cart-total {
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            margin-top: 15px;
        }
        .btn-checkout {
            display: block;
            width: 100%;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-checkout:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>

    <h1>Warung Rasa Nusantara</h1>
    
    <h2>Daftar Menu</h2>
    <div class="menu-container" id="menu-list">
        <p style="text-align: center; color: #7f8c8d;">Memuat menu makanan...</p>
    </div>

    <h2>Keranjang Belanja</h2>
    <div class="cart-container">
        <div id="cart-list">
            <p style="color: #7f8c8d; text-align: center;">Keranjang masih kosong.</p>
        </div>
        <div class="cart-total">Total: Rp <span id="cart-total-price">0</span></div>
        <button class="btn-checkout" onclick="prosesCheckout()">Confirm Pembelian</button>
    </div>

    <!-- Import SDK Firebase SDK v9 (Menggunakan CDN Terkini) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // GANTI INI DENGAN CONFIG FIREBASE ANDA SENDIRI
        const firebaseConfig = {
    	    apiKey: "AIzaSyDRJtM8QEgUSa42L3dLUf1fZ6AQzKdrOqY",
   	    authDomain: "warung-nusantara-a5ae2.firebaseapp.com",
    	    projectId: "warung-nusantara-a5ae2",
    	    storageBucket: "warung-nusantara-a5ae2.firebasestorage.app",
    	    messagingSenderId: "776992995167",
    	    appId: "1:776992995167:web:ad8850438f940bfe7828ea",
    	    measurementId: "G-1ZYH5BJDM2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let keranjang = [];

        // 1. Ambil data Menu dari Firestore secara otomatis
        async function loadMenu() {
            const menuListContainer = document.getElementById("menu-list");
            try {
                const querySnapshot = await getDocs(collection(db, "menu"));
                if (querySnapshot.empty) {
                    menuListContainer.innerHTML = `<p style="text-align: center; color: #7f8c8d;">Menu belum diisi oleh restoran.</p>`;
                    return;
                }
                
                let menuHtml = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    menuHtml += `
                        <div class="menu-item">
                            <div class="menu-info">
                                <img class="menu-img" src="${data.img || 'https://images.unsplash.com/photo-1529042410759-befb1204b468?w=200'}" alt="${data.nama}">
                                <div>
                                    <p class="menu-title">${data.nama}</p>
                                    <p class="menu-price">Rp ${data.harga.toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                            <button class="btn-add" onclick="tambahKeranjang('${data.nama}', ${data.harga})">+ Tambah</button>
                        </div>
                    `;
                });
                menuListContainer.innerHTML = menuHtml;
            } catch (error) {
                console.error("Gagal memuat menu: ", error);
                menuListContainer.innerHTML = `<p style="text-align: center; color: red;">Gagal memuat menu dari server.</p>`;
            }
        }

        // Jalankan fungsi loadMenu saat halaman siap
        window.addEventListener("DOMContentLoaded", loadMenu);

        // Fungsi manipulasi keranjang lokal
        window.tambahKeranjang = function(namaItem, hargaItem) {
            let itemAda = keranjang.find(item => item.nama === namaItem);
            if (itemAda) {
                itemAda.jumlah += 1;
            } else {
                keranjang.push({ nama: namaItem, harga: hargaItem, jumlah: 1 });
            }
            perbaruiTampilanKeranjang();
        }

        window.tambahJumlah = function(namaItem) {
            let item = keranjang.find(item => item.nama === namaItem);
            if (item) item.jumlah += 1;
            perbaruiTampilanKeranjang();
        }

        window.kurangiJumlah = function(namaItem) {
            let itemIndex = keranjang.findIndex(item => item.nama === namaItem);
            if (itemIndex !== -1) {
                keranjang[itemIndex].jumlah -= 1;
                if (keranjang[itemIndex].jumlah <= 0) {
                    keranjang.splice(itemIndex, 1);
                }
            }
            perbaruiTampilanKeranjang();
        }

        function perbaruiTampilanKeranjang() {
            let cartListElement = document.getElementById("cart-list");
            let totalElement = document.getElementById("cart-total-price");
            if (keranjang.length === 0) {
                cartListElement.innerHTML = `<p style="color: #7f8c8d; text-align: center;">Keranjang masih kosong.</p>`;
                totalElement.innerText = "0";
                return;
            }
            let htmlKonten = "";
            let totalHarga = 0;
            keranjang.forEach(item => {
                let subTotal = item.harga * item.jumlah;
                totalHarga += subTotal;
                htmlKonten += `
                    <div class="cart-item">
                        <div>
                            <span style="font-weight: 500;">${item.nama}</span><br>
                            <span style="font-size: 13px; color: #7f8c8d;">Rp ${subTotal.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="cart-controls">
                            <button class="btn-qty" onclick="kurangiJumlah('${item.nama}')">-</button>
                            <span class="qty-display">${item.jumlah}</span>
                            <button class="btn-qty" onclick="tambahJumlah('${item.nama}')">+</button>
                        </div>
                    </div>
                `;
            });
            cartListElement.innerHTML = htmlKonten;
            totalElement.innerText = totalHarga.toLocaleString('id-ID');
        }

        // 2. Fungsi Kirim Pesanan ke database Firestore (Sisi Restoran akan menerima secara real-time)
        window.prosesCheckout = async function() {
            if (keranjang.length === 0) {
                alert("Keranjang Anda masih kosong!");
                return;
            }
            
            const konfirmasi = confirm("Apakah Anda yakin ingin menyelesaikan pesanan?");
            if (konfirmasi) {
                try {
                    let totalHarga = keranjang.reduce((sum, item) => sum + (item.harga * item.jumlah), 0);
                    
                    // Simpan data orderan ke koleksi "orders"
                    await addDoc(collection(db, "orders"), {
                        items: keranjang,
                        totalPrice: totalHarga,
                        timestamp: new Date(),
                        status: "Menunggu Diproses"
                    });

                    alert("Pesanan Anda berhasil dikirim ke Restoran! Mohon tunggu konfirmasi.");
                    keranjang = [];
                    perbaruiTampilanKeranjang();
                } catch (e) {
                    console.error("Gagal mengirim pesanan: ", e);
                    alert("Terjadi kesalahan. Gagal mengirim pesanan.");
                }
            }
        }
    </script>
</body>
</html>
