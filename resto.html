<!DOCTYPE html>
<html>
<head>
    <title>Warung Rasa Nusantara - Dashboard Restoran</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #f1c40f;
            border-bottom: 2px solid #f1c40f;
            padding-bottom: 10px;
        }
        .container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h2 {
            border-bottom: 1px solid #7f8c8d;
            padding-bottom: 5px;
            color: #f39c12;
        }
        /* Form Styling */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        input {
            background-color: #ecf0f1;
            color: #2c3e50;
            font-size: 15px;
        }
        .btn-resto {
            background-color: #27ae60;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-resto:hover {
            background-color: #219653;
        }
        /* Order Cards */
        .order-card {
            background-color: #1a252f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #f1c40f;
        }
        .order-item-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>DASHBOARD RESTORAN</h1>

    <!-- 1. Form Menambah Menu Baru -->
    <div class="container">
        <h2>Input Menu Baru</h2>
        <div class="form-group">
            <label>Nama Menu Makanan/Minuman:</label>
            <input type="text" id="menu-name" placeholder="Contoh: Nasi Goreng Gila">
        </div>
        <div class="form-group">
            <label>Harga (Rupiah):</label>
            <input type="number" id="menu-price" placeholder="Contoh: 18000">
        </div>
        <div class="form-group">
            <label>Link Foto Makanan (URL Unsplash/Bebas):</label>
            <input type="text" id="menu-img" placeholder="Masukkan link gambar makanan Anda">
        </div>
        <button class="btn-resto" onclick="tambahMenuDatabase()">+ Simpan Menu ke Database</button>
    </div>

    <!-- 2. Pantau Orderan Masuk Real-Time -->
    <div class="container">
        <h2>Pesanan Masuk (Real-time)</h2>
        <div id="orders-list">
            <p style="text-align: center; color: #bdc3c7;">Belum ada pesanan yang masuk.</p>
        </div>
    </div>

    <!-- Import SDK Firebase SDK v9 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // GANTI INI DENGAN CONFIG FIREBASE ANDA SENDIRI
        const firebaseConfig = {
    	    apiKey: "AIzaSyDRJtM8QEgUSa42L3dLUf1fZ6AQzKdrOqY",
   	    authDomain: "warung-nusantara-a5ae2.firebaseapp.com",
    	    projectId: "warung-nusantara-a5ae2",
    	    storageBucket: "warung-nusantara-a5ae2.firebasestorage.app",
    	    messagingSenderId: "776992995167",
    	    appId: "1:776992995167:web:ad8850438f940bfe7828ea",
    	    measurementId: "G-1ZYH5BJDM2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Fungsi Restoran Menambah Menu ke Database
        window.tambahMenuDatabase = async function() {
            const nama = document.getElementById("menu-name").value;
            const harga = parseFloat(document.getElementById("menu-price").value);
            const img = document.getElementById("menu-img").value;

            if (!nama || isNaN(harga)) {
                alert("Harap isi nama menu dan harga yang valid!");
                return;
            }

            try {
                await addDoc(collection(db, "menu"), {
                    nama: nama,
                    harga: harga,
                    img: img || "https://images.unsplash.com/photo-1529042410759-befb1204b468?w=200"
                });
                alert("Menu baru berhasil disimpan! Sekarang pembeli bisa melihat menu ini.");
                // Reset form input
                document.getElementById("menu-name").value = "";
                document.getElementById("menu-price").value = "";
                document.getElementById("menu-img").value = "";
            } catch (error) {
                console.error("Gagal menambah menu: ", error);
                alert("Terjadi kesalahan saat menyimpan menu.");
            }
        }

        // 2. Fungsi Mendengar (Listen) Pesanan yang Masuk secara REAL-TIME
        const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
        onSnapshot(q, (querySnapshot) => {
            const ordersListContainer = document.getElementById("orders-list");
            if (querySnapshot.empty) {
                ordersListContainer.innerHTML = `<p style="text-align: center; color: #bdc3c7;">Belum ada pesanan yang masuk.</p>`;
                return;
            }

            let ordersHtml = "";
            querySnapshot.forEach((doc) => {
                const order = doc.data();
                
                // Konversi tanggal firebase
                const waktuOrder = order.timestamp ? order.timestamp.toDate().toLocaleTimeString('id-ID') : 'Sedang memuat...';

                let itemsHtml = "";
                order.items.forEach(item => {
                    itemsHtml += `
                        <div class="order-item-detail">
                            <span>${item.nama} x ${item.jumlah}</span>
                            <span>Rp ${(item.harga * item.jumlah).toLocaleString('id-ID')}</span>
                        </div>
                    `;
                });

                ordersHtml += `
                    <div class="order-card">
                        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; color: #f1c40f;">
                            <span>Pesanan Baru - Jam ${waktuOrder}</span>
                            <span>Status: ${order.status}</span>
                        </div>
                        ${itemsHtml}
                        <hr style="border: 0; border-top: 1px dashed #7f8c8d; margin: 10px 0;">
                        <div style="text-align: right; font-weight: bold; font-size: 16px;">
                            Total Bayar: Rp ${order.totalPrice.toLocaleString('id-ID')}
                        </div>
                    </div>
                `;
            });

            ordersListContainer.innerHTML = ordersHtml;
        });
    </script>
</body>
</html>
